function SimpleBarChart({data,bars,height=140}){
  if(!data||!data.length)return null;
  const W=320,H=height,P={t:10,r:10,b:24,l:50};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const maxV=Math.max(...data.flatMap(d=>bars.map(b=>d[b.key]||0)),1);
  const bW=cW/data.length;
  const nb=bars.length;const gap=4;const sw=(bW-gap*(nb+1))/nb;
  const ticks=5;
  return React.createElement("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height}},
    Array.from({length:ticks},(_,i)=>{const y=P.t+cH*(1-i/(ticks-1));const v=maxV*i/(ticks-1);return React.createElement("g",{key:"t"+i},
      React.createElement("line",{x1:P.l,x2:W-P.r,y1:y,y2:y,stroke:"#F0E4D8",strokeWidth:.5}),
      React.createElement("text",{x:P.l-4,y:y+3,textAnchor:"end",fill:"#9A7B6A",fontSize:9},v>=1000?(v/1000).toFixed(0)+"k":v.toFixed(0))
    );}),
    data.map((d,i)=>{const x=P.l+i*bW;return React.createElement("g",{key:i},
      React.createElement("text",{x:x+bW/2,y:H-4,textAnchor:"middle",fill:"#9A7B6A",fontSize:10},d.name),
      bars.map((b,bi)=>{const v=d[b.key]||0;const h=v/maxV*cH;const bx=x+gap+(gap+sw)*bi;
        return React.createElement("rect",{key:bi,x:bx,y:P.t+cH-h,width:sw,height:h,fill:b.fill,rx:3});
      })
    );})
  );
}

function SimpleLineChart({data,lines,height=130}){
  if(!data||!data.length)return null;
  const W=320,H=height,P={t:12,r:12,b:24,l:50};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const allV=data.flatMap(d=>lines.map(l=>d[l.key]||0));
  const maxV=Math.max(...allV,1);const minV=Math.min(...allV,0);
  const range=maxV-minV||1;
  const xStep=data.length>1?cW/(data.length-1):0;
  const ticks=5;
  return React.createElement("svg",{viewBox:`0 0 ${W} ${H}`,style:{width:"100%",height}},
    Array.from({length:ticks},(_,i)=>{const y=P.t+cH*(1-i/(ticks-1));const v=minV+range*i/(ticks-1);return React.createElement("g",{key:"t"+i},
      React.createElement("line",{x1:P.l,x2:W-P.r,y1:y,y2:y,stroke:"#F0E4D8",strokeDasharray:"3 3",strokeWidth:.5}),
      React.createElement("text",{x:P.l-4,y:y+3,textAnchor:"end",fill:"#9A7B6A",fontSize:9},v>=1000||v<=-1000?(v/1000).toFixed(1)+"k":v.toFixed(0))
    );}),
    data.map((d,i)=>React.createElement("text",{key:"x"+i,x:P.l+i*xStep,y:H-4,textAnchor:"middle",fill:"#9A7B6A",fontSize:10},d.name)),
    lines.map((l,li)=>{const pts=data.map((d,i)=>({x:P.l+i*xStep,y:P.t+cH*(1-(d[l.key]-minV)/range)}));
      const path=pts.map((p,i)=>((i===0?"M":"L")+p.x+","+p.y)).join(" ");
      return React.createElement("g",{key:"l"+li},
        React.createElement("path",{d:path,fill:"none",stroke:l.stroke,strokeWidth:l.strokeWidth||2,strokeDasharray:l.dash||"none"}),
        pts.map((p,i)=>React.createElement("circle",{key:i,cx:p.x,cy:p.y,r:l.dotR||3,fill:l.stroke}))
      );
    })
  );
}

function SimplePieChart({data,colors,size=100}){
  if(!data||!data.length)return null;
  const cx=size/2,cy=size/2,R=size/2-2,r=R*0.5;
  const total=data.reduce((s,d)=>s+d.value,0)||1;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{const a=d.value/total*Math.PI*2;const sa=angle;angle+=a;
    const la=sa+a/2;const x1i=cx+r*Math.cos(sa),y1i=cy+r*Math.sin(sa);
    const x1o=cx+R*Math.cos(sa),y1o=cy+R*Math.sin(sa);
    const x2i=cx+r*Math.cos(sa+a),y2i=cy+r*Math.sin(sa+a);
    const x2o=cx+R*Math.cos(sa+a),y2o=cy+R*Math.sin(sa+a);
    const lg=a>Math.PI?1:0;
    const path=`M${x1i},${y1i} L${x1o},${y1o} A${R},${R} 0 ${lg} 1 ${x2o},${y2o} L${x2i},${y2i} A${r},${r} 0 ${lg} 0 ${x1i},${y1i}`;
    return React.createElement("path",{key:i,d:path,fill:colors[d.name]||"#aaa"});
  });
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`},slices);
}

function timeSince(ts){
  if(!ts)return "";
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<10)return "agora mesmo";
  if(s<60)return "há "+s+"s";
  const m=Math.floor(s/60);
  if(m<60)return "há "+m+" min";
  const h=Math.floor(m/60);
  if(h<24)return "há "+h+"h";
  const d=Math.floor(h/24);
  return "há "+d+"d";
}

function downloadJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

function readJSONFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{try{res(JSON.parse(e.target.result));}catch(err){rej(err);}};
    r.onerror=()=>rej(new Error("Erro a ler ficheiro"));
    r.readAsText(file);
  });
}

// ============ SYNC com E2E Encryption (AES-GCM 256) ============
const SYNC_ID_KEY="fm_sync_id";
const SYNC_TS_KEY="fm_sync_ts";

let LAST_SYNC_ERR="";

// --- Base64url helpers ---
function b64enc(buf){const a=new Uint8Array(buf);let s="";for(let i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);return btoa(s).replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");}
function b64dec(s){s=s.replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";const str=atob(s);const a=new Uint8Array(str.length);for(let i=0;i<str.length;i++)a[i]=str.charCodeAt(i);return a.buffer;}

// --- Crypto helpers ---
async function genSyncKey(){
  const k=await crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]);
  return b64enc(await crypto.subtle.exportKey("raw",k));
}
async function importSyncKey(b64){return crypto.subtle.importKey("raw",b64dec(b64),{name:"AES-GCM"},false,["encrypt","decrypt"]);}
async function encryptPayload(obj,keyB64){
  const key=await importSyncKey(keyB64);
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const data=new TextEncoder().encode(JSON.stringify(obj));
  const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,data);
  return{enc:"v1",iv:b64enc(iv),ct:b64enc(ct)};
}
async function decryptPayload(obj,keyB64){
  const key=await importSyncKey(keyB64);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64dec(obj.iv)},key,b64dec(obj.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
function splitSyncId(full){const i=(full||"").indexOf("#");return i<0?{id:full||"",key:null}:{id:full.slice(0,i),key:full.slice(i+1)};}

// === Backend creators (receive final body object) ===
async function jsonblobCreate(body){
  const res=await fetch("https://jsonblob.com/api/jsonBlob",{method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(body)});
  if(!res.ok)throw new Error("jsonblob HTTP "+res.status);
  let id=null;
  for(const[k,v]of res.headers.entries()){if(k.toLowerCase()==="location"){id=v.split("/").pop();break;}}
  if(!id&&res.url){const m=res.url.match(/\/jsonBlob\/([^/?#]+)/);if(m)id=m[1];}
  if(!id)throw new Error("jsonblob: Location header bloqueado por CORS");
  return "JB:"+id;
}
async function npointCreate(body){
  const res=await fetch("https://api.npoint.io",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok)throw new Error("npoint HTTP "+res.status);
  const j=await res.json().catch(()=>null);
  if(!j||!j.id)throw new Error("npoint: resposta sem id");
  return "NP:"+j.id;
}
async function ntfyCreate(body){
  const chars="abcdefghjkmnpqrstuvwxyz23456789";
  let topic="oinc-";
  const rnd=crypto.getRandomValues(new Uint8Array(16));
  for(let i=0;i<16;i++)topic+=chars[rnd[i]%chars.length];
  const res=await fetch("https://ntfy.sh/"+topic,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(body)});
  if(!res.ok)throw new Error("ntfy HTTP "+res.status);
  return "NT:"+topic;
}

async function syncCreate(data){
  LAST_SYNC_ERR="";
  const errs=[];
  const keyB64=await genSyncKey();
  const enc=await encryptPayload(data,keyB64);
  const body={ts:Date.now(),...enc};
  for(const fn of [npointCreate,jsonblobCreate,ntfyCreate]){
    try{
      const id=await fn(body);
      const full=id+"#"+keyB64;
      localStorage.setItem(SYNC_ID_KEY,full);
      return full;
    }catch(e){console.warn(fn.name,"failed:",e);errs.push(fn.name+": "+e.message);}
  }
  LAST_SYNC_ERR=errs.join(" | ");
  return null;
}

function syncUrl(id){
  if(id.startsWith("JB:"))return{url:"https://jsonblob.com/api/jsonBlob/"+id.slice(3),isNtfy:false};
  if(id.startsWith("NP:"))return{url:"https://api.npoint.io/"+id.slice(3),isNtfy:false};
  if(id.startsWith("NT:"))return{url:"https://ntfy.sh/"+id.slice(3)+"/json?poll=1&since=all",isNtfy:true};
  return{url:"https://jsonblob.com/api/jsonBlob/"+id,isNtfy:false};
}

async function syncRead(){
  const full=localStorage.getItem(SYNC_ID_KEY);
  if(!full)return null;
  const{id,key}=splitSyncId(full);
  try{
    const{url,isNtfy}=syncUrl(id);
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    if(!res.ok)return null;
    let body;
    if(isNtfy){
      const text=await res.text();
      const lines=text.trim().split("\n").filter(Boolean);
      if(!lines.length)return null;
      const last=JSON.parse(lines[lines.length-1]);
      body=JSON.parse(last.message);
    }else{
      body=await res.json();
    }
    if(body&&body.enc==="v1"){
      if(!key)return null; // encrypted but no local key
      try{const data=await decryptPayload(body,key);return{ts:body.ts,data};}
      catch(e){console.error("decrypt failed:",e);return null;}
    }
    return body; // legacy unencrypted
  }catch{return null;}
}

async function syncWrite(data){
  const full=localStorage.getItem(SYNC_ID_KEY);
  if(!full)return false;
  const{id,key}=splitSyncId(full);
  try{
    let body;
    if(key){
      const enc=await encryptPayload(data,key);
      body={ts:Date.now(),...enc};
    }else{
      body={ts:Date.now(),data};
    }
    const bodyStr=JSON.stringify(body);
    if(id.startsWith("NT:")){
      await fetch("https://ntfy.sh/"+id.slice(3),{method:"POST",headers:{"Content-Type":"text/plain"},body:bodyStr});
    }else{
      const{url}=syncUrl(id);
      await fetch(url,{method:"PUT",headers:{"Content-Type":"application/json","Accept":"application/json"},body:bodyStr});
    }
    localStorage.setItem("fm_last_sync",String(Date.now()));
    return true;
  }catch(e){console.error("syncWrite:",e);return false;}
}

  if(!txs.length)return"Sem movimentos em "+monthLabel+" para analisar.";
  const inc=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);

  const byCat={};txs.filter(t=>t.type==="expense").forEach(t=>{const n=ALLCATS[t.category]||t.category;byCat[n]=(byCat[n]||0)+t.amount;});
  const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  const byUser={};txs.filter(t=>t.type==="expense").forEach(t=>{byUser[t.user]=(byUser[t.user]||0)+t.amount;});
  // Previous month
  let[_py,_pm]=month.split("-").map(Number);_pm-=1;if(_pm<1){_pm=12;_py--;}
  const pm=`${_py}-${String(_pm).padStart(2,"0")}`;
  const ptxs=state.transactions.filter(t=>gm(t.date)===pm);

  const pinc=ptxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);

  const pbyCat={};ptxs.filter(t=>t.type==="expense").forEach(t=>{const n=ALLCATS[t.category]||t.category;pbyCat[n]=(pbyCat[n]||0)+t.amount;});
  const spikes=sorted.filter(([cat,val])=>{const prev=pbyCat[cat]||0;return prev>0&&val>prev*1.5;}).map(([cat,val])=>({cat,val,prev:pbyCat[cat]||0}));
  // Restaurants count
  const eatOut=txs.filter(t=>t.type==="expense"&&t.category==="food_out");
  const eatOutTotal=eatOut.reduce((s,t)=>s+t.amount,0);
  const eatOutCount=eatOut.length;
  // Build text
  let r="";
  r+="📊 RESUMO DO MÊS\n";
  r+=bal>=0?`Mês positivo! Saldo de ${fmt(bal)}.\n`:`Mês negativo — despesas excedem receitas em ${fmt(Math.abs(bal))}.\n`;
  r+=`Total de ${txs.length} movimentos: ${fmt(inc)} em receitas e ${fmt(exp)} em despesas.\n\n`;
  r+="💰 PRINCIPAIS DESPESAS\n";
  top3.forEach(([cat,val],i)=>{r+=`${i+1}. ${cat}: ${fmt(val)} (${exp>0?Math.round(val/exp*100):0}%)\n`;});
  r+="\n";
  if(Object.keys(byUser).length>1){
    r+="👥 POR PESSOA\n";
    Object.entries(byUser).forEach(([u,v])=>{r+=`• ${u}: ${fmt(v)} (${exp>0?Math.round(v/exp*100):0}%)\n`;});
    r+="\n";
  }
  if(pexp>0){
    r+="📈 COMPARAÇÃO COM MÊS ANTERIOR\n";
    const diff=exp-pexp;
    r+=diff>0?`Gastaram mais ${fmt(diff)} (+${Math.round(diff/pexp*100)}%) do que no mês anterior.\n`:`Gastaram menos ${fmt(Math.abs(diff))} (-${Math.round(Math.abs(diff)/pexp*100)}%) — parabéns!\n`;
    r+="\n";
  }
  if(spikes.length>0){
    r+="⚠️ CATEGORIAS QUE SUBIRAM\n";
    spikes.forEach(s=>{r+=`• ${s.cat}: de ${fmt(s.prev)} para ${fmt(s.val)} (+${Math.round((s.val-s.prev)/s.prev*100)}%)\n`;});
    r+="\n";
  }
  r+="✅ O QUE CORREU BEM\n";
  if(bal>=0)r+="• Conseguiram manter o saldo positivo — continuem assim!\n";
  const cheapCats=sorted.filter(([,v])=>v<50);
  if(cheapCats.length>0)r+=`• ${cheapCats.length} categorias mantidas abaixo dos 50€.\n`;
  if(eatOutCount<10)r+="• Refeições fora controladas.\n";
  r+="\n";
  r+="💡 3 SUGESTÕES PRÁTICAS\n";
  if(eatOutTotal>200)r+=`1. Restaurantes/takeaway somaram ${fmt(eatOutTotal)} (${eatOutCount}x). Tentem reduzir para ${eatOutCount>8?Math.round(eatOutCount*0.7):eatOutCount-2} vezes para poupar ~${fmt(eatOutTotal*0.3)}.\n`;
  else r+="1. Bom controlo nas refeições fora — mantenham este nível!\n";
  const transportTotal=byCat["🚗 Transporte"]||0;
  if(transportTotal>200)r+=`2. Transporte a ${fmt(transportTotal)} — considerem planear deslocações para reduzir abastecimentos.\n`;
  else r+="2. Considerem definir orçamentos mensais por categoria para ter alertas automáticos.\n";
  if((state.goals||[]).length===0)r+="3. Criem um objetivo de poupança (ex: férias, fundo emergência) para motivar a poupar todos os meses.\n";
  else if(state.goals&&state.goals.length>0){const g=state.goals[0];r+=`3. O vosso objetivo "${g.name}" está a ${g.target>0?Math.round(g.current/g.target*100):0}% — tentem depositar ${fmt(Math.min(100,(g.target-g.current)*0.1))} este mês.\n`;}
  else r+="3. Criem um objetivo de poupança para motivar a poupar todos os meses.\n";

  const tips=["Experimentem a regra 50/30/20: 50% necessidades, 30% desejos, 20% poupança.","Antes de compras acima de 50€, esperem 48 horas — evita compras por impulso.","Registem despesas no momento da compra. Quanto mais rápido, mais preciso o controlo!","Façam uma revisão financeira juntos ao domingo — 10 minutos chegam para alinhar a semana.","Definam um 'dia sem gastos' por semana — pequenos hábitos fazem grande diferença."];

function parseReceipt(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const lowerText=text.toLowerCase();
  let amount=null,store=null,category=null;

  // 1. Find total amount - try multiple patterns common in Portuguese receipts
  const totalPatterns=[
    /total\s*(?:a\s*pagar|eur|€)?\s*[:\s]*(\d+[.,]\d{2})/i,
    /valor\s*total\s*[:\s]*(\d+[.,]\d{2})/i,
    /total\s*[:\s]*€?\s*(\d+[.,]\d{2})/i,
    /a\s*pagar\s*[:\s]*€?\s*(\d+[.,]\d{2})/i,
    /montante\s*[:\s]*€?\s*(\d+[.,]\d{2})/i,
    /eur\s*(\d+[.,]\d{2})/i,
  ];
  for(const pat of totalPatterns){
    const m=text.match(pat);
    if(m){amount=parseFloat(m[1].replace(",","."));break;}
  }
  // Fallback: find the largest number that looks like a price
  if(!amount){
    const prices=[...text.matchAll(/(\d+[.,]\d{2})/g)].map(m=>parseFloat(m[1].replace(",",".")));
    if(prices.length>0)amount=Math.max(...prices);
  }

  // 2. Detect store name from first few lines (usually at top of receipt)
  const header=lines.slice(0,6).join(" ").toLowerCase();
  for(const[storeName,catId] of Object.entries(STORE_CAT_MAP)){
    if(header.includes(storeName)||lowerText.includes(storeName)){
      store=storeName.charAt(0).toUpperCase()+storeName.slice(1).trim();
      category=catId;
      break;
    }
  }

  // 3. If no store found, try to guess category from keywords
  if(!category){
    const kwCat=[
      [["supermercado","mercearia","talho","peixaria","frutaria"],"food"],
      [["restaurante","refeição","refeicao","almoço","almoco","jantar","snack","menu"],"food_out"],
      [["gasolina","gasóleo","gasoleo","combustível","combustivel","portagem","estacionamento"],"transport"],
      [["farmácia","farmacia","medicamento","receita médica"],"health"],
      [["roupa","sapatos","calçado","calcado","acessório","acessorio"],"clothing"],
    ];
    for(const[kws,catId] of kwCat){
      if(kws.some(kw=>lowerText.includes(kw))){category=catId;break;}
    }
  }

  return{amount,store,category:category||"other"};
}

async function ocrReceipt(file){
  const worker=await Tesseract.createWorker("por",1,{
    workerPath:"https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js",
    corePath:"https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js",
  });
  const{data:{text}}=await worker.recognize(file);
  await worker.terminate();
  return text;
}

function QuickSummaryWidget({monthTxs,fMonth}){
  const today=tod();
  const inc=monthTxs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const exp=monthTxs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  const todayExp=monthTxs.filter(t=>t.type==="expense"&&t.date===today).reduce((s,t)=>s+t.amount,0);
  const txCount=monthTxs.length;
  const budgetAdherence=bal>=0?100:Math.max(0,Math.round((inc/(inc+exp)*100)||0));
  let message="🎯 Mês com potencial!";
  if(bal<0&&bal>-200)message="⚠️ Controla os gastos";
  else if(bal<-200)message="🚨 Gastos acima das receitas";
  else if(bal>500)message="✨ Mês muito positivo!";
  return<div style={{...S.box,marginBottom:14,background:"linear-gradient(135deg,"+((bal>=0)?"#E8F4F0":"#FAEEE8")+","+((bal>=0)?"#D4E8E0":"#F5DED4")+")",borderLeft:"4px solid "+(bal>=0?"#6B9E8E":"#C45A32")}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      <div>
        <div style={{fontSize:11,color:bal>=0?"#4A7D6E":"#A03A1A",textTransform:"uppercase",fontWeight:700,letterSpacing:0.5}}>Saldo</div>
        <div style={{fontSize:20,fontWeight:700,color:bal>=0?"#4A7D6E":"#C45A32"}}>{fmt(bal)}</div>
      </div>
      <div>
        <div style={{fontSize:11,color:"#666",textTransform:"uppercase",fontWeight:700,letterSpacing:0.5}}>Hoje</div>
        <div style={{fontSize:20,fontWeight:700,color:"#C45A32"}}>-{fmt(todayExp)}</div>
      </div>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#666",marginBottom:8,paddingBottom:8,borderBottom:"1px solid "+(bal>=0?"rgba(107,158,142,0.2)":"rgba(196,90,50,0.2)")}}>
      <span>{txCount} movimento{txCount!==1?"s":""}</span>
      <span>{budgetAdherence}% aderência</span>
    </div>
    <div style={{fontSize:13,fontWeight:700,color:bal>=0?"#4A7D6E":"#A03A1A"}}>{message}</div>
  </div>;
}

// ============ AI TAB ============
function AITab({state,fMonth,ml}){
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[error,setError]=useState(null);
  const[mode,setMode]=useState("local"); // "local" or "api"
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("fm_api_key")||"");
  const[showSettings,setShowSettings]=useState(false);

  const saveApiKey=(k)=>{setApiKey(k);localStorage.setItem("fm_api_key",k);};

  const analyseLocal=()=>{
    setLoading(true);setError(null);setResult(null);
    setTimeout(()=>{
      const r=analyzeLocally(state,fMonth,ml);
      setResult(r);setLoading(false);
    },800);
  };

  const analyseAPI=async()=>{
    if(!apiKey){setError("Configura a tua API Key nas definições abaixo.");return;}
    setLoading(true);setError(null);setResult(null);
    const txs=state.transactions.filter(t=>gm(t.date)===fMonth);
    if(!txs.length){setError("Sem movimentos em "+ml);setLoading(false);return;}
    const inc=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const exp=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const byCat={};txs.filter(t=>t.type==="expense").forEach(t=>{byCat[ALLCATS[t.category]||t.category]=(byCat[ALLCATS[t.category]||t.category]||0)+t.amount;});
    const summary={mês:ml,totalReceitas:inc,totalDespesas:exp,saldo:inc-exp,categorias:Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([k,v])=>k+": "+v.toFixed(2)+"€"),movimentos:txs.length};
    try{
      const proxyUrl=localStorage.getItem("fm_proxy_url")||"/.netlify/functions/ai";
      const res=await fetch(proxyUrl,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({apiKey,system:"És um assistente financeiro familiar. Respondes em português europeu (PT). Dás conselhos práticos e encorajadores. Usa emojis com moderação.",
          messages:[{role:"user",content:`Analisa as finanças da Família Martinho para ${ml}:\n${JSON.stringify(summary,null,2)}\n\nInclui: 1. Resumo 2. Padrões 3. O que correu bem 4. 3 sugestões 5. Dica motivacional`}]})
      });
      const data=await res.json();
      if(data.error){setError(data.error.message||"Erro da API");setLoading(false);return;}
      setResult(data.content?.[0]?.text||data.result||"Sem resposta.");
    }catch(e){setError("Erro de ligação. Verifica se o proxy está configurado.");}
    setLoading(false);
  };

  const analyse=()=>mode==="local"?analyseLocal():analyseAPI();

  return<div>
    <div style={{...S.box,textAlign:"center",padding:"22px 18px"}}>
      <div style={{fontSize:44,marginBottom:10}}>🤖</div>
      <div style={{fontWeight:700,fontSize:16,color:"#3D2B1A",marginBottom:6}}>Análise Financeira — {ml}</div>
      <div style={{fontSize:13,color:"#9A7B6A",marginBottom:14,lineHeight:1.6}}>Analisa os teus gastos e recebe sugestões personalizadas.</div>
      <div style={{display:"flex",gap:8,marginBottom:14,justifyContent:"center"}}>
        <button style={{...S.tBtn,...(mode==="local"?S.tInc:{})}} onClick={()=>setMode("local")}>📊 Análise Local</button>
        <button style={{...S.tBtn,...(mode==="api"?{background:"#F0F4FF",borderColor:"#5B8FC9",color:"#3A6EA8"}:{})}} onClick={()=>setMode("api")}>🤖 Claude API</button>
      </div>
      {mode==="api"&&<div style={{marginBottom:14}}>
        <button style={{fontSize:11,color:"#5B8FC9",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}} onClick={()=>setShowSettings(!showSettings)}>⚙️ Configurar API Key</button>
        {showSettings&&<div style={{marginTop:10,textAlign:"left"}}>
          <label style={S.fl}>Anthropic API Key</label>
          <input style={S.inp} type="password" placeholder="sk-ant-..." value={apiKey} onChange={e=>saveApiKey(e.target.value)}/>
          <label style={S.fl}>URL do Proxy (opcional)</label>
          <input style={S.inp} placeholder="/.netlify/functions/ai" defaultValue={localStorage.getItem("fm_proxy_url")||""} onChange={e=>localStorage.setItem("fm_proxy_url",e.target.value)}/>
          <p style={{fontSize:11,color:"#9A7B6A",lineHeight:1.5}}>A API Key fica guardada apenas no teu telemóvel. O proxy é necessário porque o browser não consegue chamar a API directamente.</p>
        </div>}
      </div>}
      <button style={{...S.saveBtn,maxWidth:260,margin:"0 auto",display:"block"}} onClick={analyse} disabled={loading}>{loading?"⏳ A analisar…":"✨ Analisar este mês"}</button>
    </div>
    {error&&<div style={{...S.box,background:"#FAEEE8",color:"#C45A32",fontSize:13}}>{error}</div>}
    {result&&<div style={{...S.box,lineHeight:1.8,fontSize:13,color:"#3D2B1A",whiteSpace:"pre-wrap"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={S.boxTitle}>📋 Análise</div>
        <button style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#9A7B6A"}} onClick={()=>setResult(null)}>✕</button>
      </div>
      {result}
    </div>}
  </div>;
}

          <button style={{...S.miniBtn,borderColor:"#6B9E8E",color:"#6B9E8E"}} onClick={()=>{navigator.clipboard?.writeText(syncId).then(()=>alert("Código copiado!")).catch(()=>{const ta=document.createElement("textarea");ta.value=syncId;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Código copiado!");});}}>📋 Copiar código</button>
        </div>
        <p style={{fontSize:12,color:"#9A7B6A",marginBottom:14,lineHeight:1.6,textAlign:"center"}}>Envia este código <strong>completo</strong> à Sara por WhatsApp.<br/>Ela cola em "Juntar sincronização" e pronto!</p>
        <div style={{background:"#E8F4F0",borderRadius:10,padding:"10px 14px",marginBottom:10}}>
          <div style={{fontSize:11,color:"#4A7D6E",fontWeight:700}}>✅ Sincronização ativa {syncId.includes("#")&&"· 🔒 Cifrado E2E"}</div>
          <div style={{fontSize:11,color:"#6B9E8E",marginTop:3}}>{lastSyncAt?"Último sync: "+timeSince(lastSyncAt):"A aguardar primeiro sync..."}</div>

        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <button style={{...S.expBtn,borderColor:"#5B8FC9",color:"#5B8FC9",flex:1}} disabled={syncing} onClick={async()=>{setSyncing(true);await onSyncNow();setSyncing(false);}}>{syncing?"⏳ ...":"🔄 Sincronizar agora"}</button>
          <button style={{...S.expBtn,borderColor:"#9A7B6A",color:"#9A7B6A",flex:1}} disabled={syncing} onClick={doTest}>{syncing?"⏳ ...":"🧪 Testar ligação"}</button>
        </div>
        {testResult&&<div style={{background:testResult.ok?"#E8F4F0":"#FAEEE8",borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:12,color:testResult.ok?"#4A7D6E":"#C45A32"}}>{testResult.msg}</div>}
        <button style={{...S.delBtn}} onClick={()=>{if(confirm("Desligar sincronização?")){onDisconnect();}}}>🔌 Desligar sincronização</button>

        <p style={{fontSize:13,color:"#3D2B1A",marginBottom:8,lineHeight:1.6,textAlign:"center"}}>Sincroniza os dados entre os telemóveis do Vasco e da Sara.</p>

        {testResult&&!testResult.ok&&<div style={{background:"#FAEEE8",borderRadius:10,padding:"8px 12px",marginBottom:14,fontSize:11,color:"#C45A32",lineHeight:1.5}}>{testResult.msg}</div>}

      </div>}

    </div>

// ============ ADD MODAL ============
function AddModal({onSave,onClose,customCats,onOpenCatModal}){
  const[type,setType]=useState("expense");
  const[amt,setAmt]=useState("");
  const[cat,setCat]=useState(ECATS[0].id);
  const[user,setUser]=useState(USERS[0]);
  const[acc,setAcc]=useState(ACCS[0]);
  const[accTo,setAccTo]=useState(ACCS[1]);
  const[date,setDate]=useState(tod());
  const[desc,setDesc]=useState("");
  const[photo,setPhoto]=useState(null);
  const[split,setSplit]=useState(false);
  const[reimbursable,setReimbursable]=useState(false);
  const[scanning,setScanning]=useState(false);
  const[scanMsg,setScanMsg]=useState("");
  const defaultCats=type==="expense"?ECATS:ICATS;
  const cats=type==="transfer"?[]:[...defaultCats,...(customCats[type]||[])];
  const go=()=>{
    const a=parseFloat(String(amt).replace(",","."));
    if(!a||a<=0)return;
    if(type==="transfer"){
      if(acc===accTo){alert("Escolhe contas diferentes para a transferência.");return;}
      onSave({type:"transfer",amount:a,from:acc,to:accTo,user,date,description:desc||`${acc} → ${accTo}`});
      return;
    }
    onSave({type,amount:a,category:cat,user,account:acc,date,description:desc,photo,split,reimbursable});
  };

  const handleScan=async(file)=>{
    if(!file)return;
    setScanning(true);setScanMsg("A processar recibo...");
    try{
      const compressed=await compressImg(file);
      setPhoto(compressed);
      setScanMsg("A ler texto (OCR)...");
      const text=await ocrReceipt(file);
      setScanMsg("A analisar valores...");
      const result=parseReceipt(text);
      if(result.amount){setAmt(String(result.amount));setScanMsg("");}
      else setScanMsg("Valor não detetado — preenche manualmente");
      if(result.category){setCat(result.category);setType("expense");}
      if(result.store)setDesc(result.store);
    }catch(err){setScanMsg("Erro no OCR — preenche manualmente");}
    setScanning(false);
  };

  return<div style={S.ov} onClick={onClose}>
    <div style={{...S.modal,maxHeight:"85vh",overflowY:"auto",WebkitOverflowScrolling:"touch",position:"relative"}} onClick={e=>e.stopPropagation()}>
      <ModalHeader title="Novo Movimento" onClose={onClose}/>

      {/* Receipt Scanner Button */}
      <div style={{marginBottom:14}}>
        <input type="file" accept="image/*" capture="environment" style={{display:"none"}} id="scan-in"
          onChange={e=>{if(e.target.files[0])handleScan(e.target.files[0]);}}/>
        <label htmlFor="scan-in" style={{display:"block",padding:"13px 14px",borderRadius:12,
          background:"linear-gradient(135deg,#E07B54,#C45A32)",color:"#fff",cursor:scanning?"wait":"pointer",
          textAlign:"center",fontSize:14,fontWeight:700,boxShadow:"0 2px 8px rgba(224,123,84,0.3)",
          opacity:scanning?0.7:1}}>
          {scanning?"⏳ "+scanMsg:"📷 Escanear Recibo (auto-preenche)"}
        </label>
        {scanMsg&&!scanning&&<div style={{fontSize:11,color:"#9A7B6A",textAlign:"center",marginTop:4}}>{scanMsg}</div>}
      </div>

      <div style={{height:1,background:"#F0E4D8",margin:"0 0 14px"}}/>

      <div style={{display:"flex",gap:6,marginBottom:13}}>
        {[{k:"expense",l:"💸 Despesa",s:S.tExp},{k:"income",l:"💰 Receita",s:S.tInc},{k:"transfer",l:"🔄 Transf.",s:{background:"#E8F0FF",borderColor:"#5B8FC9",color:"#3A6FA5"}}].map(t=><button key={t.k} style={{...S.tBtn,fontSize:12,padding:"9px 4px",...(type===t.k?t.s:{})}} onClick={()=>{setType(t.k);if(t.k!=="transfer")setCat((t.k==="expense"?ECATS:ICATS)[0].id);setSplit(false);setReimbursable(false);}}>{t.l}</button>)}
      </div>
      <label style={S.fl}>Valor (€)</label>
      <input style={{...S.inp,...(amt&&!isNaN(parseFloat(String(amt).replace(",",".")))?{borderColor:"#6B9E8E",background:"#F0FAF5"}:{})}} type="number" inputMode="decimal" placeholder="0,00" value={amt} onChange={e=>setAmt(e.target.value)} autoFocus/>
      <label style={S.fl}>Pessoa</label>
      <div style={{display:"flex",gap:8,marginBottom:13}}>
        {USERS.map(u=><button key={u} style={{...S.tBtn,...(user===u?{background:UC[u],borderColor:UC[u],color:"#fff"}:{})}} onClick={()=>setUser(u)}>{u}</button>)}
      </div>
      {type==="transfer"?<>
        <label style={S.fl}>De (conta origem)</label>
        <select style={S.sel} value={acc} onChange={e=>setAcc(e.target.value)}>{ACCS.map(a=><option key={a} value={a}>{a}</option>)}</select>
        <label style={S.fl}>Para (conta destino)</label>
        <select style={S.sel} value={accTo} onChange={e=>setAccTo(e.target.value)}>{ACCS.map(a=><option key={a} value={a}>{a}</option>)}</select>
      </>:<>
        <label style={S.fl}>Conta</label>
        <select style={S.sel} value={acc} onChange={e=>setAcc(e.target.value)}>{ACCS.map(a=><option key={a} value={a}>{a}</option>)}</select>
        <label style={S.fl}>Categoria</label>
        <div style={{display:"flex",gap:8,marginBottom:13}}>
          <select style={{...S.sel,flex:1,marginBottom:0}} value={cat} onChange={e=>setCat(e.target.value)}>{cats.map(c=><option key={c.id} value={c.id}>{c.l}</option>)}</select>
          <button style={{flex:"0 0 40px",padding:"10px",borderRadius:10,border:"1.5px solid #E0CEBE",background:"#fff",fontSize:16,cursor:"pointer",fontFamily:"inherit"}} onClick={onOpenCatModal} title="Gerenciar categorias">＋</button>
        </div>
      </>}
      <label style={S.fl}>Data</label>
      <input style={S.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
      <label style={S.fl}>Nota (opcional)</label>
      <input style={S.inp} type="text" placeholder="ex: Supermercado Continente" value={desc} onChange={e=>setDesc(e.target.value)}/>
      {!photo&&<div style={{marginBottom:13}}>
        <label style={S.fl}>📷 Foto do recibo</label>
        <input type="file" accept="image/*" capture="environment" style={{display:"none"}} id="photo-in" onChange={async e=>{if(e.target.files[0]){const c=await compressImg(e.target.files[0]);setPhoto(c);}}}/>
        <label htmlFor="photo-in" style={{display:"block",padding:"10px 14px",borderRadius:11,border:"1.5px dashed #E0CEBE",background:"#fff",color:"#9A7B6A",cursor:"pointer",textAlign:"center",fontSize:13}}>
          📷 Tirar / escolher foto
        </label>
      </div>}
      {photo&&<div style={{marginBottom:13}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <img src={photo} alt="" style={{width:60,height:60,objectFit:"cover",borderRadius:10,border:"2px solid #6B9E8E"}}/>
          <div>
            <div style={{fontSize:12,color:"#4A7D6E",fontWeight:600}}>✅ Recibo anexado</div>
            <button style={{fontSize:11,color:"#C45A32",background:"none",border:"none",padding:0,cursor:"pointer",textDecoration:"underline"}} onClick={()=>setPhoto(null)}>Remover</button>
          </div>
        </div>
      </div>}
      {type==="expense"&&<label style={{display:"flex",alignItems:"center",marginBottom:10,cursor:"pointer"}}>
        <input type="checkbox" checked={split} onChange={e=>setSplit(e.target.checked)} style={{marginRight:8,accentColor:"#B07CC6"}}/>
        <span style={{fontSize:13,color:"#3D2B1A"}}>🧾 Dividir 50/50 entre Vasco e Sara</span>
      </label>}
      {type==="expense"&&<label style={{display:"flex",alignItems:"center",marginBottom:14,cursor:"pointer"}}>
        <input type="checkbox" checked={reimbursable} onChange={e=>setReimbursable(e.target.checked)} style={{marginRight:8,accentColor:"#E8A44A"}}/>
        <span style={{fontSize:13,color:"#3D2B1A"}}>💵 Reembolsável (vou receber de volta)</span>
      </label>}
      <button style={S.saveBtn} onClick={go}>Guardar Movimento</button>
      <button style={S.closeBtn} onClick={onClose}>Cancelar</button>
    </div>
  </div>;
}

    const a=parseFloat(String(amt).replace(",","."));

        {USERS.map(u=><button key={u} style={{...S.tBtn,...(user===u?{background:UC[u],borderColor:UC[u],color:"#fff"}:{})}} onClick={()=>setUser(u)}>{u}</button>)}
      </div>
      <label style={S.fl}>Conta</label>
      <select style={S.sel} value={acc} onChange={e=>setAcc(e.target.value)}>{ACCS.map(a=><option key={a} value={a}>{a}</option>)}</select>
      <label style={S.fl}>Categoria</label>
      <select style={S.sel} value={cat} onChange={e=>setCat(e.target.value)}>{cats.map(c=><option key={c.id} value={c.id}>{c.l}</option>)}</select>
      <label style={S.fl}>Data</label>
      <input style={S.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/>
      <label style={S.fl}>Nota</label>
      <input style={S.inp} type="text" value={desc} onChange={e=>setDesc(e.target.value)}/>
      <button style={S.saveBtn} onClick={save}>💾 Guardar alterações</button>
      <button style={S.closeBtn} onClick={()=>setEditing(false)}>Cancelar</button>
    </div>
  </div>;
  return<div style={S.ov} onClick={onClose}>
    <div style={{...S.modal,position:"relative"}} onClick={e=>e.stopPropagation()}>

      <div style={S.dGrid}>
        <span style={S.dL}>Tipo</span><span style={{color:isTransfer?"#5B8FC9":tx.type==="income"?"#4A7D6E":"#C45A32",fontWeight:700}}>{isTransfer?"🔄 Transferência":tx.type==="income"?"Receita":"Despesa"}</span>
        <span style={S.dL}>Valor</span><span style={{fontWeight:700,fontSize:17}}>{fmt(tx.amount)}</span>
        <span style={S.dL}>Data</span><span>{tx.date}</span>
        <span style={S.dL}>Pessoa</span><span style={{color:UC[tx.user]||"#999",fontWeight:700}}>{tx.user}</span>
        {isTransfer?<>
          <span style={S.dL}>{tx.transfer_side==="out"?"De":"Para"}</span><span>{tx.account}</span>
          <span style={S.dL}>{tx.transfer_side==="out"?"Para":"De"}</span><span>{tx.transfer_peer||"—"}</span>

        {tx.recurring_id&&<><span style={S.dL}>Tipo</span><span style={{color:"#5B8FC9"}}>🔁 Recorrente</span></>}

const PIN_KEY="fm_pin_hash";
const BIOMETRIC_KEY="fm_biometric";

function hashPin(pin){
  let h=0;const s=pin+"fm_salt_2026";
  for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  return String(Math.abs(h));
}

async function biometricRegister(){
  try{
    if(!window.PublicKeyCredential)return false;
    const avail=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!avail)return false;
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    const cred=await navigator.credentials.create({publicKey:{
      challenge,rp:{name:"Família Martinho",id:location.hostname},
      user:{id:new Uint8Array(16),name:"familia",displayName:"Família Martinho"},
      pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],
      authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},
      timeout:60000
    }});
    if(cred){localStorage.setItem(BIOMETRIC_KEY,cred.id);return true;}
    return false;
  }catch{return false;}
}

async function biometricAuth(){
  try{
    const credId=localStorage.getItem(BIOMETRIC_KEY);
    if(!credId||!window.PublicKeyCredential)return false;
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    const assertion=await navigator.credentials.get({publicKey:{
      challenge,rpId:location.hostname,
      allowCredentials:[{type:"public-key",id:Uint8Array.from(atob(credId.replace(/-/g,'+').replace(/_/g,'/')),c=>c.charCodeAt(0)),transports:["internal"]}],
      userVerification:"required",timeout:60000
    }});
    return!!assertion;
  }catch{return false;}
}

const PIN_ATTEMPTS_KEY="fm_pin_attempts";
const PIN_LOCKOUT_KEY="fm_pin_lockout";

function LockScreen({onUnlock}){
  const[pin,setPin]=useState("");
  const[step,setStep]=useState(()=>localStorage.getItem(PIN_KEY)?"login":"setup");
  const[confirmPin,setConfirmPin]=useState("");
  const[error,setError]=useState("");
  const[bioAvail,setBioAvail]=useState(false);
  const[lockoutLeft,setLockoutLeft]=useState(()=>{
    const t=parseInt(localStorage.getItem(PIN_LOCKOUT_KEY)||"0");
    return t>Date.now()?Math.ceil((t-Date.now())/1000):0;
  });
  const hasBio=!!localStorage.getItem(BIOMETRIC_KEY);

  useEffect(()=>{
    (async()=>{
      if(window.PublicKeyCredential){
        const a=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        setBioAvail(a);
      }
    })();
    // Auto-trigger biometric on login
    if(step==="login"&&hasBio&&lockoutLeft===0){
      biometricAuth().then(ok=>{if(ok)onUnlock();});
    }
  },[]);

  // Lockout countdown
  useEffect(()=>{
    if(lockoutLeft<=0)return;
    const t=setInterval(()=>{
      setLockoutLeft(l=>{
        if(l<=1){localStorage.removeItem(PIN_LOCKOUT_KEY);return 0;}
        return l-1;
      });
    },1000);
    return()=>clearInterval(t);
  },[lockoutLeft]);

  const handleDigit=d=>{
    if(lockoutLeft>0)return;
    if(pin.length>=4)return;
    const np=pin+d;
    setPin(np);setError("");
    if(np.length===4){
      if(step==="setup"){setConfirmPin(np);setPin("");setStep("confirm");}
      else if(step==="confirm"){
        if(np===confirmPin){
          localStorage.setItem(PIN_KEY,hashPin(np));
          localStorage.removeItem(PIN_ATTEMPTS_KEY);
          // Offer biometric
          if(bioAvail){setStep("biometric");setPin("");}
          else onUnlock();
        }else{setError("PINs não coincidem. Tenta de novo.");setPin("");setStep("setup");setConfirmPin("");}
      }
      else if(step==="login"){
        if(hashPin(np)===localStorage.getItem(PIN_KEY)){
          localStorage.removeItem(PIN_ATTEMPTS_KEY);
          onUnlock();
        }
        else{
          const n=parseInt(localStorage.getItem(PIN_ATTEMPTS_KEY)||"0")+1;
          localStorage.setItem(PIN_ATTEMPTS_KEY,String(n));
          if(n>=5){
            const until=Date.now()+60000;
            localStorage.setItem(PIN_LOCKOUT_KEY,String(until));
            setLockoutLeft(60);
            setError("5 tentativas erradas. Bloqueado 60s.");
          }else{
            setError("PIN incorreto ("+n+"/5)");
          }
          setPin("");
        }
      }
    }
  };
  const handleDelete=()=>{setPin(p=>p.slice(0,-1));setError("");};
  const handleBio=async()=>{const ok=await biometricAuth();if(ok)onUnlock();else setError("Autenticação falhou");};
  const setupBio=async()=>{const ok=await biometricRegister();if(ok){setStep("done");setTimeout(onUnlock,800);}else{onUnlock();}};

  const dots=Array.from({length:4},(_,i)=>React.createElement("div",{key:i,style:{
    width:18,height:18,borderRadius:"50%",border:"2px solid #E07B54",
    background:i<pin.length?"#E07B54":"transparent",transition:"background 0.15s"
  }}));

  const numpad=[1,2,3,4,5,6,7,8,9,"bio",0,"del"].map((n,i)=>{
    if(n==="bio")return React.createElement("button",{key:i,style:{
      width:68,height:68,borderRadius:"50%",border:"none",background:"transparent",fontSize:28,cursor:hasBio&&step==="login"?"pointer":"default",opacity:hasBio&&step==="login"?1:0
    },onClick:hasBio&&step==="login"?handleBio:undefined},hasBio?"😊":"");
    if(n==="del")return React.createElement("button",{key:i,style:{
      width:68,height:68,borderRadius:"50%",border:"none",background:"transparent",fontSize:22,cursor:"pointer",color:"#E07B54"
    },onClick:handleDelete},"⌫");
    return React.createElement("button",{key:i,style:{
      width:68,height:68,borderRadius:"50%",border:"1.5px solid #E0CEBE",background:"rgba(255,255,255,0.6)",
      fontSize:26,fontWeight:500,color:"#3D2B1A",cursor:"pointer",fontFamily:"inherit",
      WebkitTapHighlightColor:"transparent"
    },onClick:()=>handleDigit(String(n))},n);
  });

  if(step==="biometric")return React.createElement("div",{style:{
    position:"fixed",inset:0,background:"#FEF5EC",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",zIndex:9999,padding:30
  }},
    React.createElement("div",{style:{fontSize:52,marginBottom:20}},"😊"),
    React.createElement("div",{style:{fontSize:17,fontWeight:700,color:"#3D2B1A",marginBottom:10,textAlign:"center"}},"Ativar Face ID / Touch ID?"),
    React.createElement("div",{style:{fontSize:13,color:"#9A7B6A",marginBottom:30,textAlign:"center"}},"Para desbloquear mais rápido"),
    React.createElement("button",{style:{padding:"14px 40px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#E07B54,#C45A32)",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:12},onClick:setupBio},"Ativar"),
    React.createElement("button",{style:{padding:"10px 30px",borderRadius:12,border:"none",background:"transparent",color:"#9A7B6A",fontSize:13,cursor:"pointer"},onClick:onUnlock},"Agora não")
  );

  if(step==="done")return React.createElement("div",{style:{
    position:"fixed",inset:0,background:"#FEF5EC",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",zIndex:9999
  }},
    React.createElement("div",{style:{fontSize:52,marginBottom:16}},"✅"),
    React.createElement("div",{style:{fontSize:17,fontWeight:700,color:"#3D2B1A"}},"Tudo configurado!")
  );

  return React.createElement("div",{style:{
    position:"fixed",inset:0,background:"#FEF5EC",display:"flex",flexDirection:"column",
    alignItems:"center",justifyContent:"center",zIndex:9999,padding:20
  }},
    React.createElement("div",{style:{fontSize:42,marginBottom:12}},"🐷"),
    React.createElement("div",{style:{fontSize:20,fontWeight:700,color:"#3D2B1A",marginBottom:4}},"Família Martinho"),
    React.createElement("div",{style:{fontSize:13,color:"#9A7B6A",marginBottom:28}},
      step==="setup"?"Cria um PIN de 4 dígitos":
      step==="confirm"?"Confirma o PIN":
      "Introduz o teu PIN"
    ),
    React.createElement("div",{style:{display:"flex",gap:14,marginBottom:8}},dots),
    lockoutLeft>0?React.createElement("div",{style:{fontSize:13,color:"#C45A32",marginBottom:8,fontWeight:700,textAlign:"center"}},"🔒 Bloqueado por "+lockoutLeft+"s"):
    error?React.createElement("div",{style:{fontSize:12,color:"#C45A32",marginBottom:8,height:18}},error):
    React.createElement("div",{style:{height:26}}),
    React.createElement("div",{style:{
      display:"grid",gridTemplateColumns:"repeat(3,68px)",gap:14,justifyContent:"center",opacity:lockoutLeft>0?0.35:1,pointerEvents:lockoutLeft>0?"none":"auto"
    }},numpad)
  );
}

  useEffect(()=>{
    const saved=loadLocal();
    setState(saved||{transactions:SEED_TRANSACTIONS,budgets:{},goals:[],recurring:[]});
  },[]);

  // Save dark mode and custom categories
  useEffect(()=>{
    localStorage.setItem("fm_dark_mode",darkMode?"1":"0");
  },[darkMode]);

  },[customCats]);

  // Save on change
  useEffect(()=>{if(!state)return;const n=Date.now();if(n-lastSave.current<300)return;lastSave.current=n;saveLocal(state);},[state]);

  // Sync polling
  useEffect(()=>{
    if(!syncId){clearInterval(pollRef.current);return;}
    const poll=async()=>{
      const remote=await syncRead();
      if(!remote?.data)return;
      setState(local=>{
        if(!local)return local;
        // Merge: combine transactions by ID
        const localIds=new Set(local.transactions.map(t=>t.id));
        const remoteIds=new Set(remote.data.transactions?.map(t=>t.id)||[]);
        const merged=[...local.transactions];
        (remote.data.transactions||[]).forEach(t=>{if(!localIds.has(t.id))merged.push(t);});
        const changed=merged.length!==local.transactions.length;
        if(changed){setSyncPulse(true);setTimeout(()=>setSyncPulse(false),3000);lastSave.current=Date.now();}
        const newState={...local,transactions:merged,goals:[...(remote.data.goals||local.goals)],recurring:[...(remote.data.recurring||local.recurring)]};
        if(changed)saveLocal(newState);
        return changed?newState:local;
      });
    };
    poll();
    pollRef.current=setInterval(poll,15000);
    return()=>clearInterval(pollRef.current);
  },[syncId]);

  // Push to sync on state change
  useEffect(()=>{
    if(!state||!syncId)return;
    const t=setTimeout(async()=>{

  const toast$=useCallback((msg,warn=false)=>{setToast({msg,warn});setTimeout(()=>setToast(null),2800);},[]);

      const news=(s.recurring||[]).filter(r=>r.active&&!existing.has(r.id)).map(r=>({...r,id:uid(),recurring_id:r.id,type:"expense",date:`${fMonth}-${String(r.day||1).padStart(2,"0")}`}));

              </div>

        {tab==="goals"&&<>

        </>}

        {tab==="ai"&&<AITab state={state} fMonth={fMonth} ml={ml}/>}

      <div style={S.nav} className="nav-bar">
        {TABS.map(t=><button key={t.id} style={{...S.navBtn,...(tab===t.id?S.navA:{})}} onClick={()=>setTab(t.id)}>

        </button>)}
      </div>

      {addOpen&&<AddModal onSave={addTx} onClose={()=>setAddOpen(false)} customCats={customCats} onOpenCatModal={()=>{setAddOpen(false);setCatModalOpen(true);}}/>}
      {detailTx&&<DetailModal tx={detailTx} onDelete={delTx} onEdit={editTx} onReimburse={markReimbursed} onClose={()=>setDetailTx(null)} customCats={customCats}/>}
      {budgetOpen&&<BudgetModal month={fMonth} ml={ml} budgets={state.budgets} onSave={saveBdg} onClose={()=>setBudgetOpen(false)}/>}
      {goalOpen&&<GoalModal onSave={addGoal} onClose={()=>setGoalOpen(false)}/>}
      {recurOpen&&<RecurModal onSave={saveRecur} onClose={()=>setRecurOpen(false)}/>}
      {syncOpen&&<SyncModal syncId={syncId} onSync={handleSyncCreate} onJoin={handleSyncJoin} onDisconnect={handleSyncDisconnect} onClose={()=>setSyncOpen(false)} lastSyncAt={lastSyncAt} onSyncNow={async()=>{if(!state)return;const ok=await syncWrite(state);if(ok){setLastSyncAt(Date.now());toast$("Dados enviados");const r=await syncRead();if(r?.data){setState(local=>{const localIds=new Set(local.transactions.map(t=>t.id));const merged=[...local.transactions];(r.data.transactions||[]).forEach(t=>{if(!localIds.has(t.id))merged.push(t);});if(merged.length!==local.transactions.length){setSyncPulse(true);setTimeout(()=>setSyncPulse(false),3000);const ns={...local,transactions:merged,goals:[...(r.data.goals||local.goals)],recurring:[...(r.data.recurring||local.recurring)]};saveLocal(ns);return ns;}return local;});}}else{toast$("Erro ao sincronizar","warn");}}}/>}
      {settingsOpen&&<SettingsModal notifsEnabled={notifsEnabled} onToggleNotifs={handleToggleNotifs} onOpenSync={()=>{setSettingsOpen(false);setSyncOpen(true);}} onOpenCatModal={()=>{setSettingsOpen(false);setCatModalOpen(true);}} darkMode={darkMode} onToggleDarkMode={handleToggleDarkMode} onClose={()=>setSettingsOpen(false)} onExport={handleExport} onImport={handleImport} lastSyncAt={lastSyncAt} syncId={syncId}/>}
      {catModalOpen&&<CategoryModal customCats={customCats} onAddCat={addCustomCat} onDelCat={delCustomCat} darkMode={darkMode} onClose={()=>setCatModalOpen(false)}/>}
    </div>
  );
}

// ============ RENDER ============
const AUTO_LOCK_MS=3*60*1000; // 3 min
function Root(){
  const[unlocked,setUnlocked]=useState(false);
  const hiddenAt=useRef(0);
  useEffect(()=>{
    if(!unlocked)return;
    const onVis=()=>{
      if(document.hidden){hiddenAt.current=Date.now();}
      else if(hiddenAt.current&&Date.now()-hiddenAt.current>AUTO_LOCK_MS){
        // Only lock if a PIN exists
        if(localStorage.getItem(PIN_KEY))setUnlocked(false);
      }
    };
    document.addEventListener("visibilitychange",onVis);
    return()=>document.removeEventListener("visibilitychange",onVis);
  },[unlocked]);
  if(!unlocked)return React.createElement(LockScreen,{onUnlock:()=>setUnlocked(true)});
  return React.createElement(App);
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
<script>
// Force reset: visit ?reset to clear all caches and service workers
if(location.search.includes('reset')){
  (async()=>{
    // Unregister all service workers
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      for(const r of regs)await r.unregister();
    }
    // Delete all caches
    if('caches' in window){
      const keys=await caches.keys();
      for(const k of keys)await caches.delete(k);
    }
    // Clean URL and hard reload
    location.replace(location.origin+location.pathname);
  })();
}else{
  // Normal Service Worker Registration
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
}
// Keyboard fix for iOS - prevent nav bar overlap
if(window.visualViewport){
  window.visualViewport.addEventListener('resize',()=>{
    const nav=document.querySelector('.nav-bar');
    if(nav){
      const diff=window.innerHeight-window.visualViewport.height;
      nav.style.bottom=diff>50?diff+'px':'0';
    }
  });
}
</script>
